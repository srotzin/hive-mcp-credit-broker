name: hive-mcp-credit-broker
displayName: hive-mcp-credit-broker — broker-only credit/lending discovery
version: "1.0.0"
description: >
  Broker-only credit/lending discovery shim. Surfaces real lending markets
  from licensed/established third-party protocols: Aave v3, Compound v3,
  Morpho Blue, Spark, Maple, Goldfinch. Returns provider, asset, supply
  APY, borrow APY, utilization, and total liquidity. Routing/discovery
  only — Hive does not lend, originate, hold collateral, or service debt.
  All credit products are provided by third-party protocols. Verify
  protocol terms, audit status, and licensing before borrowing.
  MCP 2024-11-05 over Streamable-HTTP.

